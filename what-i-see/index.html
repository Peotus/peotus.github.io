        <h1>What i see?</h1>
        <p>This is a small experiment to share what I see each day — fleeting shapes dancing across the sky, a screen, or any flat, endless surface. They drift with my gaze, always there but never still. When I try to focus, they scatter, like shadows running from the light.</p>
